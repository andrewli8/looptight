name: release

# Build and publish to PyPI when a version tag is pushed. Uses PyPI trusted
# publishing (OIDC), so no API token is stored in the repo. Configure the trusted
# publisher for the `looptight` project on PyPI once before the first tagged release.
on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - run: uv publish --trusted-publishing always
